<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <!-- Project styles -->
        <link rel="stylesheet" href="css/styles.css">
        <link rel="stylesheet" href="css/components.css">
        <title>Settings — Pinch</title>
        <link rel="manifest" href="manifest.json">
        <meta name="theme-color" content="#9b7cff">
        <!-- App initialization -->
        <script type="module" src="js/app.js"></script>
</head>
<body>
    <!-- Loading overlay while checking authentication -->
    <div id="auth-loading" class="position-fixed top-0 start-0 w-100 h-100 d-flex align-items-center justify-content-center bg-white" style="z-index: 9999;">
        <div class="text-center">
            <div class="spinner-border text-primary mb-3" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="text-muted">Checking authentication...</p>
        </div>
    </div>
        <div id="app-header"></div>
        <main class="min-vh-100 p-4 bg-surface">
            <div class="container">
                <section class="bg-white rounded shadow p-4">
                    <h2 class="h5 fw-semibold">Settings</h2>
                    <div class="mt-4">
                        <button id="restart-app" class="btn btn-danger w-100 mb-2">Restart for New Month</button>
                        <div class="d-flex gap-2">
                            <button id="export-data" class="btn btn-outline-primary flex-grow-1">Export Data</button>
                            <button id="import-data" class="btn btn-outline-secondary flex-grow-1">Import Data</button>
                        </div>
                    </div>
                </section>
                <section class="bg-white rounded shadow p-4 mt-4">
                    <h2 class="fw-semibold">Release Notes</h2>
                    <h3 class="h5"> Current Version: <strong>0.3 </strong></h3>
                    <div class="mt-3">
                    </div>
                    <div class="mt-3">
                        <p class="small mb-2"><strong>v.0.3 - Improved data persistence and retrieval</strong> - </p>
                        <p class="small mb-2"><strong>v.0.2 - UI changes and functionality fixes</strong> - </p>
                        <p class="small text-muted"><strong>v.0.1</strong> - Dashboard, expenses and restart settings functionality</p>
                    </div>
                </section>
            </div>
        </main>

        <script type="module" src="js/app.js"></script>
        <script type="module" src="js/pages/settings.js"></script>
</body>
</html>
