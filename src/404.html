<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1" />
		<title>Page Not Found — Pinch</title>
		<link rel="manifest" href="/manifest.json" />
		<link rel="icon" href="/icons/icon-192x192.png" />
		<link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
		<meta name="theme-color" content="#9b7cff" />
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
			rel="stylesheet"
		/>
		<link rel="stylesheet" href="/css/styles.css" />
		<link rel="stylesheet" href="/css/components.css" />
	</head>
	<body class="bg-surface">
		<main
			class="min-vh-100 d-flex align-items-center justify-content-center p-4"
		>
			<div
				class="bg-white rounded shadow p-4 p-md-5 text-center"
				style="max-width: 34rem; width: 100%"
			>
				<div class="mb-3">
					<h1 class="h3 fw-semibold mb-2">Page not found</h1>
					<p class="text-muted mb-0">
						The page you were looking for does not exist or may have moved.
					</p>
				</div>

				<div class="d-grid gap-2 mt-4">
					<a href="/login.html" class="btn btn-primary">Go to Login</a>
					<a href="/dashboard.html" class="btn btn-outline-secondary"
						>Go to Dashboard</a
					>
				</div>

				<p class="small text-muted mt-4 mb-0">
					If you opened an old bookmark, update it to one of the current app
					pages.
				</p>
			</div>
		</main>
	</body>
</html>
